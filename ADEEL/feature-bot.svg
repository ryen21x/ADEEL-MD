<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="ADEEL MD ADVANCED FEATURES">
  <defs>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="200%" y2="0%">
      <stop offset="0%"   stop-color="#FFD700">
        <animate attributeName="stop-color" values="#FFD700;#FF1493;#00FFFF;#FF4500;#FFD700" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#00FFFF">
        <animate attributeName="stop-color" values="#00FFFF;#FF4500;#FFD700;#FF1493;#00FFFF" dur="8s" repeatCount="indefinite" />
      </stop>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1,0" to="1,0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="carbonBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#121225"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <linearGradient id="movingLineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-opacity="0" stop-color="#00FFFF">
         <animate attributeName="stop-color" values="#00FFFF;#FFD700;#FF1493;#00FFFF" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-opacity="0.95" stop-color="#FFD700">
         <animate attributeName="stop-color" values="#FFD700;#FF1493;#00FFFF;#FFD700" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-opacity="0" stop-color="#FF1493">
         <animate attributeName="stop-color" values="#FF1493;#00FFFF;#FFD700;#FF1493" dur="10s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <filter id="softBlur"> <feGaussianBlur stdDeviation="1.2" /> </filter>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge> <feMergeNode in="blur"/> <feMergeNode in="SourceGraphic"/> </feMerge>
    </filter>
  </defs>

  <rect x="10" y="10" width="1180" height="400" rx="25" fill="url(#carbonBg)" stroke="url(#cyberGrad)" stroke-width="4">
    <animate attributeName="stroke-opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </rect>

  <g filter="url(#neonGlow)">
    <circle r="3" fill="#FF1493">
      <animate attributeName="cx" values="50;1150;50" dur="15s" repeatCount="indefinite" />
      <animate attributeName="cy" values="50;350;50" dur="20s" repeatCount="indefinite" />
    </circle>
    <circle r="3.5" fill="#00FFFF">
      <animate attributeName="cx" values="1100;100;1100" dur="18s" repeatCount="indefinite" />
      <animate attributeName="cy" values="100;300;100" dur="25s" repeatCount="indefinite" />
    </circle>
    <circle r="3" fill="#FFD700">
      <animate attributeName="cx" values="600;1150;50" dur="22s" repeatCount="indefinite" />
      <animate attributeName="cy" values="380;50;380" dur="15s" repeatCount="indefinite" />
    </circle>
  </g>

  <g opacity="0.5">
    <circle cx="200" cy="150" r="1.2" fill="#FFFFFF"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite" /></circle>
    <circle cx="400" cy="300" r="1" fill="#FFFFFF"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" repeatCount="indefinite" /></circle>
    <circle cx="800" cy="100" r="1.5" fill="#FFFFFF"><animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite" /></circle>
    <circle cx="1000" cy="350" r="1" fill="#FFFFFF"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite" /></circle>
    <circle cx="150" cy="380" r="1.2" fill="#FFFFFF"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite" /></circle>
    <circle cx="950" cy="50" r="1" fill="#FFFFFF"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite" /></circle>
  </g>

  <g filter="url(#softBlur)">
    <rect x="0" y="80" width="300" height="2" fill="url(#movingLineGrad)">
      <animate attributeName="x" values="-300;1200" dur="12s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="200" width="350" height="2" fill="url(#movingLineGrad)">
      <animate attributeName="x" values="1200;-350" dur="15s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="320" width="280" height="2" fill="url(#movingLineGrad)">
      <animate attributeName="x" values="-280;1200" dur="18s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="600" y="65" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="url(#cyberGrad)" filter="url(#neonGlow)" letter-spacing="3">
    PREMIUM FEATURES
  </text>

  <g font-family="Consolas, monospace" font-size="17" font-weight="bold" fill="#FFFFFF">
    <text x="70" y="130">
      <tspan x="70" dy="0" fill="#FFD700">◈ AUTOMATION</tspan>
      <tspan x="85" dy="30">» Status Observer</tspan>
      <tspan x="85" dy="28">» Instant React AI</tspan>
      <tspan x="85" dy="28">» Anti-ViewOnce</tspan>
      <tspan x="85" dy="28">» Auto-Like Stories</tspan>
      <tspan x="85" dy="28">» Message Retriever</tspan>
      <tspan x="85" dy="28">» Anti-Call System</tspan>
    </text>

    <text x="360" y="130">
      <tspan x="360" dy="0" fill="#FF1493">◈ MEDIA HUB</tspan>
      <tspan x="375" dy="30">» HD Status Saver</tspan>
      <tspan x="375" dy="28">» Universal DL</tspan>
      <tspan x="375" dy="28">» YT Turbo Downloader</tspan>
      <tspan x="375" dy="28">» TikTok No Watermark</tspan>
      <tspan x="375" dy="28">» Music Search Engine</tspan>
      <tspan x="375" dy="28">» FB/Insta Saver</tspan>
    </text>

    <text x="670" y="130">
      <tspan x="670" dy="0" fill="#00FFFF">◈ SMART ENGINE</tspan>
      <tspan x="685" dy="30">» Gemini AI Chat</tspan>
      <tspan x="685" dy="28">» Image Generation</tspan>
      <tspan x="685" dy="28">» Group Shield Pro</tspan>
      <tspan x="685" dy="28">» Auto-Kick Spammers</tspan>
      <tspan x="685" dy="28">» Admin Console</tspan>
      <tspan x="685" dy="28">» Welcome Message</tspan>
    </text>

    <text x="950" y="130">
      <tspan x="950" dy="0" fill="#FF4500">◈ UTILITIES</tspan>
      <tspan x="965" dy="30">» Sticker Maker</tspan>
      <tspan x="965" dy="28">» File Converter</tspan>
      <tspan x="965" dy="28">» Voice Modifier</tspan>
      <tspan x="965" dy="28">» Profile Manager</tspan>
      <tspan x="965" dy="28">» Game Center</tspan>
      <tspan x="965" dy="28">» 24/7 Uptime</tspan>
    </text>
  </g>

  <path d="M50 395 L1150 395" stroke="url(#cyberGrad)" stroke-width="3" stroke-dasharray="15,8" filter="url(#neonGlow)">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="4s" repeatCount="indefinite"/>
  </path>
</svg>
